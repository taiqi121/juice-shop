name: "Scheduled Security Scan"

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:  # Allow manual triggering

jobs:
  codeql-analysis:
    name: "CodeQL Security Analysis"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
      issues: write
    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']
    steps:
      - name: "Check out Git repository"
        uses: actions/checkout@3df4ab11eba7bda6032a0b82a6bb43b11571feac #v4.0.0

      - name: "Initialize CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended
          config: |
            paths-ignore:
              - 'data/static/codefixes'

      - name: "Autobuild"
        uses: github/codeql-action/autobuild@v3

      - name: "Perform CodeQL Analysis"
        id: codeql
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          output: sarif-results

      - name: "Upload SARIF results as artifact"
        uses: actions/upload-artifact@a8a3f3ad30e3422c9c7b888a15615d19a852ae32 #v3.1.3
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: sarif-results/
          retention-days: 7

      - name: "Create GitHub Issues for high-severity CodeQL findings"
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const resultsDir = 'sarif-results';
            if (!fs.existsSync(resultsDir)) {
              console.log('No SARIF results directory found, skipping issue creation');
              return;
            }

            const sarifFiles = fs.readdirSync(resultsDir).filter(f => f.endsWith('.sarif'));
            if (sarifFiles.length === 0) {
              console.log('No SARIF files found');
              return;
            }

            const scanDate = new Date().toISOString();
            // Ensure codeql label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: 'codeql',
              });
            } catch (e) {
              if (e.status === 404) {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name: 'codeql',
                  color: '8b5cf6',
                  description: 'CodeQL security finding',
                });
              }
            }

            for (const sarifFile of sarifFiles) {
              let sarif;
              try {
                sarif = JSON.parse(fs.readFileSync(path.join(resultsDir, sarifFile), 'utf8'));
              } catch (e) {
                console.log(`Could not parse ${sarifFile}:`, e.message);
                continue;
              }

              for (const run of (sarif.runs || [])) {
                const rules = {};
                // Build a map of ruleId -> rule metadata
                const extensions = (run.tool && run.tool.extensions) || [];
                for (const ext of extensions) {
                  for (const rule of (ext.rules || [])) {
                    rules[rule.id] = rule;
                  }
                }
                for (const rule of ((run.tool && run.tool.driver && run.tool.driver.rules) || [])) {
                  rules[rule.id] = rule;
                }

                for (const result of (run.results || [])) {
                  // Filter to error-level or high security-severity results only
                  const level = result.level || 'warning';
                  const ruleId = result.ruleId || 'unknown';
                  const rule = rules[ruleId] || {};
                  const secSeverity = rule.properties && rule.properties['security-severity'];
                  // security-severity is a CVSS score string; >= 7.0 is high/critical
                  const isHighSeverity = level === 'error' || (secSeverity && parseFloat(secSeverity) >= 7.0);
                  if (!isHighSeverity) continue;

                  const message = (result.message && result.message.text) || 'No description available';
                  const locations = result.locations || [];
                  const loc = locations[0];
                  const filePath = loc && loc.physicalLocation &&
                    loc.physicalLocation.artifactLocation &&
                    loc.physicalLocation.artifactLocation.uri || 'unknown';
                  const lineNumber = loc && loc.physicalLocation &&
                    loc.physicalLocation.region &&
                    loc.physicalLocation.region.startLine || 'unknown';

                  const ruleDesc = rule.shortDescription && rule.shortDescription.text || ruleId;
                  const title = `[Security] CodeQL: ${ruleDesc} in \`${filePath}\``;

                  // Check for duplicate open issues
                  const existingIssues = await github.rest.issues.listForRepo({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    state: 'open',
                    labels: 'security,codeql',
                    per_page: 100,
                  });

                  const duplicate = existingIssues.data.some(issue => issue.title === title);
                  if (duplicate) {
                    console.log(`Skipping duplicate issue: ${title}`);
                    continue;
                  }

                  const helpUri = rule.helpUri || (result.hostedViewerUri) || '';
                  const body = [
                    `## CodeQL Security Finding`,
                    ``,
                    `| Field | Value |`,
                    `|-------|-------|`,
                    `| **Rule ID** | \`${ruleId}\` |`,
                    `| **Rule** | ${ruleDesc} |`,
                    `| **Level** | \`${level}\` |`,
                    `| **File** | \`${filePath}\` |`,
                    `| **Line** | \`${lineNumber}\` |`,
                    secSeverity ? `| **CVSS Score** | \`${secSeverity}\` |` : '',
                    helpUri ? `| **Reference** | [Documentation](${helpUri}) |` : '',
                    ``,
                    `## Description`,
                    ``,
                    message,
                    ``,
                    `## Remediation`,
                    ``,
                    `Review the code at \`${filePath}:${lineNumber}\` and address the identified vulnerability.`,
                    helpUri ? `Refer to the [CodeQL documentation](${helpUri}) for guidance.` : '',
                    ``,
                    `---`,
                    `*This issue was automatically created by the [scheduled security scan](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/security-scan.yml).*`,
                    `*Scan date: ${scanDate}*`,
                  ].filter(l => l !== '').join('\n');

                  const created = await github.rest.issues.create({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    title,
                    body,
                    labels: ['security', 'codeql', 'bug'],
                  });
                  console.log(`Created issue #${created.data.number}: ${title}`);
                }
              }
            }
